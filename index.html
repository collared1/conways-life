<html>
    <head>
        <style>
            html, body {
                overflow: hidden;
            }
            .board {
                width: 70vh;
                height: 70vh;
                display: grid;
                border: 2px solid black;
            }
            .button {
                background-color: red;
                width: 50vh;
                height: 8vh;
                font-size: 40px;
                font-weight: bold;
                color: white;
                cursor: pointer;
            }
            p {
                font-family: sans-serif;
                font-size: 25px;
                margin: -0px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div style="width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px;">
            <div style="display: flex; justify-content: center; align-items: center; gap: 40px; width: 50vh;"><p id="generation">Generation: 0</p><p id="population">Population: 0</p></div>
            <div class="board" id="board"></div>
            <div style="width: 50vh; display: flex; justify-content: center;
            align-items: center; gap: 3vw;">
                <textarea style="resize: none; width: 23.5vh;" placeholder="Width (Game Pixels, DEFAULT: 300)" id="width"></textarea>
                <textarea style="resize: none; width: 23.5vh;" placeholder="Height (Game Pixels, DEFAULT: 300)" id="height"></textarea>
            </div>
            <button class="button" id="button">Unpause</button>
        </div>
        <script>
            const button = document.getElementById("button");
            button.addEventListener("mousedown", pause);
            let width = 300;
            let height = 300;
            let paused = true;
            let ended = false;
            let generation = 0;
            let generationNotifier = document.getElementById("generation");
            let populationNotifier = document.getElementById("population")
            let widthChanger = document.getElementById("width");
            widthChanger.addEventListener("input", changeStats);
            let heightChanger = document.getElementById("height");
            heightChanger.addEventListener("input", changeStats);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const board = document.getElementById("board");
            let divs = {};
            function createBoard() {
                board.innerHTML = "";
                board.style["grid-template-columns"] = `repeat(${width}, 1fr)`;
                board.style["grid-template-rows"] = `repeat(${height}, 1fr)`;
                divs = {};
                for (let i = 0; i < height; i++) {
                    divs[i] = [];
                    for (let j = 0; j < width; j++) {
                        const div = document.createElement("div");
                        div.style["cursor"] = "pointer";
                        let filled = false;
                        if (Math.random() < 0.5) {
                            div.style["background-color"] = "black";
                            filled = true;
                        }
                        board.appendChild(div);
                        divs[i].push({filled: filled, html: div})
                        div.addEventListener("mousedown", changeSquare);
                    }
                }
            }
            function checkConditions(x, y) {
                let filledSquares = 0;
                for (let i = x-1; i < x+2; i++) {
                    for (let j = y-1; j < y+2; j++) {
                        if ((i == x && j == y) || i >= width || i < 0 || j >= height || j < 0) {
                            continue;
                        }
                        if (divs[j][i].filled == true) {
                            filledSquares++;
                        }
                    }
                }
                if (filledSquares < 2) {
                    return false;
                } else if (filledSquares > 3) {
                    return false;
                } else if (filledSquares == 3) {
                    return true;
                } else if (filledSquares == 2 && divs[y][x].filled == true) {
                    return true;
                }
            }
            async function conwaysLife() {
                createBoard()
                while (true) {
                    await sleep(10);
                    if (ended) {
                        ended = false;
                        conwaysLife();
                    }
                    if (paused) {
                        continue;
                    }
                    let population = 0;
                    const newDivs = {};
                    for (let y = 0; y < height; y++) {
                        newDivs[y] = [];
                        for (let x = 0; x < width; x++) {
                            newDivs[y].push(checkConditions(x, y));
                        }
                    }
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            if (newDivs[y][x]) {
                                population++;
                                divs[y][x].html.style.backgroundColor = "black";
                            } else {
                                divs[y][x].html.style.backgroundColor = "white";
                            }
                        }
                    }
                    for (let i = 0; i < width; i++) {
                        for (let j = 0; j < height; j++) {
                            divs[j][i].filled = newDivs[j][i];
                        }
                    }
                    generation++;
                    generationNotifier.innerHTML = "Generation: " + generation; 
                    populationNotifier.innerHTML = "Population: " + population;
                }
            }
            function changeSquare(event) {
                const square = event.target;
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        if (divs[y][x].html === square) {
                            divs[y][x].filled = !divs[y][x].filled;
                            square.style.backgroundColor = divs[y][x].filled ? "black" : "white";
                            return;
                        }
                    }
                }
            }
            function pause(event) {
                const button = event.target;
                if (paused) {
                    paused = false;
                    button.style.backgroundColor = "green";
                    button.innerHTML = "Pause";
                } else {
                    paused = true;
                    button.style.backgroundColor = "red";
                    button.innerHTML = "Unpause";
                }
            }
            function changeStats(event) {
                target = event.target;
                if (target === widthChanger) {
                    width = parseInt(target.value, 10);
                } else {
                    height = parseInt(target.value, 10);
                }
                ended = true;
            }
            conwaysLife();
        </script>
    </body>
</html>
