<html>
    <head>
        <style>
            html, body {
                overflow: hidden;
            }
            .board {
                width: 70vh;
                height: 70vh;
                display: grid;
                border: 2px solid black;
            }
            .button {
                background-color: red;
                width: 50vh;
                height: 70px;
                font-size: 40px;
                font-weight: bold;
                color: white;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div style="width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 30px;">
            <div class="board" id="board"></div>
            <button class="button" id="button">Unpause</button>
        </div>
        <script>
            const button = document.getElementById("button");
            button.addEventListener("mousedown", pause);
            const width = 300;
            const height = 300;
            let paused = true;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const board = document.getElementById("board");
            board.style["grid-template-columns"] = `repeat(${width}, 1fr)`
            board.style["grid-template-rows"] = `repeat(${height}, 1fr)`
            let divs = {};
            for (let i = 0; i < height; i++) {
                divs[i] = [];
                for (let j = 0; j < width; j++) {
                    const div = document.createElement("div");
                    div.style["cursor"] = "pointer";
                    let filled = false;
                    if (Math.random() < 0.5) {
                        div.style["background-color"] = "black";
                        filled = true;
                    }
                    board.appendChild(div);
                    divs[i].push({filled: filled, html: div})
                    div.addEventListener("mousedown", changeSquare);
                }
            }
            function checkConditions(x, y) {
                let filledSquares = 0;
                for (let i = x-1; i < x+2; i++) {
                    for (let j = y-1; j < y+2; j++) {
                        if ((i == x && j == y) || i >= width || i < 0 || j >= height || j < 0) {
                            continue;
                        }
                        if (divs[j][i].filled == true) {
                            filledSquares++;
                        }
                    }
                }
                if (filledSquares < 2) {
                    return false;
                } else if (filledSquares > 3) {
                    return false;
                } else if (filledSquares == 3) {
                    return true;
                } else if (filledSquares == 2 && divs[y][x].filled == true) {
                    return true;
                }
            }
            async function conwaysLife() {
                while (true) {
                    await sleep(10);
                    if (paused) {
                        continue;
                    }
                    const newDivs = {};
                    for (let y = 0; y < height; y++) {
                        newDivs[y] = [];
                        for (let x = 0; x < width; x++) {
                            newDivs[y].push(checkConditions(x, y));
                        }
                    }
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            if (newDivs[y][x]) {
                                divs[y][x].html.style.backgroundColor = "black";
                            } else {
                                divs[y][x].html.style.backgroundColor = "white";
                            }
                        }
                    }
                    for (let i = 0; i < width; i++) {
                        for (let j = 0; j < height; j++) {
                            divs[j][i].filled = newDivs[j][i];
                        }
                    }
                }
            }
            function changeSquare(event) {
                const square = event.target;
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        if (divs[y][x].html === square) {
                            divs[y][x].filled = !divs[y][x].filled;
                            square.style.backgroundColor = divs[y][x].filled ? "black" : "white";
                            return;
                        }
                    }
                }
            }
            function pause(event) {
                const button = event.target;
                if (paused) {
                    paused = false;
                    button.style.backgroundColor = "green";
                    button.innerHTML = "Pause";
                } else {
                    paused = true;
                    button.style.backgroundColor = "red";
                    button.innerHTML = "Unpause";
                }
            }
            conwaysLife();
        </script>
    </body>
</html>
